services:
  wwv:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - wwv-data:/app/data
    env_file:
      - path: .env
        required: false
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET is required — generate with: openssl rand -hex 32}"
      - "WWV_DEMO_ADMIN_SECRET=${WWV_DEMO_ADMIN_SECRET:-}"
      - "WWV_BRIDGE_TOKEN=${WWV_BRIDGE_TOKEN:-}"

  iranwarlive-backend:
    build: ./packages/wwv-plugin-iranwarlive/backend
    volumes:
      - iranwarlive-data:/app/data
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iranwarlive-api.rule=Host(`api.worldwideview.dev`) && PathPrefix(`/iranwarlive`)"
      - "traefik.http.routers.iranwarlive-api.entrypoints=websecure"
      - "traefik.http.routers.iranwarlive-api.tls=true"
      - "traefik.http.routers.iranwarlive-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.iranwarlive-api.loadbalancer.server.port=5001"

volumes:
  wwv-data:
  iranwarlive-data:
